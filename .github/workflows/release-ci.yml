name: 🚀 Release-CI - ByteBerry OAuth2 - Service

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency:
  group: release-ci
  cancel-in-progress: false

env:
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.17.1'
  REGISTRY: docker.io
  IMAGE_NAME: jruvalcabafsd/byteberry-oauth2

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  validate:
    name: 🔍 Pre-Release Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      current-version: ${{ steps.version.outputs.current-version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run full validation
        run: pnpm ci:all
        env:
          NODE_ENV: test
          CI: true
          PORT: 4000
          LOG_LEVEL: info
          CORS_ORIGINS: http://localhost:5173,http://localhost:4002,http://localhost:4003
									
      - name: 📋 Get current version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: 🔍 Check if should release
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "Manual release triggered"
          else
            COMMITS=$(git log --format="%s" HEAD~1..HEAD)
            if echo "$COMMITS" | grep -E "^(feat|fix|BREAKING CHANGE)"; then
              echo "should-release=true" >> $GITHUB_OUTPUT
              echo "Found releasable commits"
            else
              echo "should-release=false" >> $GITHUB_OUTPUT
              echo "No releasable commits found"
            fi
          fi

  release:
    name: 📦 Semantic Release
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should-release == 'true'
    timeout-minutes: 20

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🏷️ Run semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm release --debug > release-output.log 2>&1 || RELEASE_EXIT_CODE=$?

          if grep -q "Published release" release-output.log; then
            echo "released=true" >> $GITHUB_OUTPUT

            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

            IFS='.' read -r major minor patch <<< "$NEW_VERSION"
            echo "major=$major" >> $GITHUB_OUTPUT
            echo "minor=$minor" >> $GITHUB_OUTPUT
            echo "patch=$patch" >> $GITHUB_OUTPUT

            echo "✅ Release created: v$NEW_VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No release was created"

            CURRENT_VERSION=$(node -p "require('./package.json').version")
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

          echo "📋 Release Log:"
          cat release-output.log

      - name: 📊 Upload release artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.release.outputs.version }}
          path: |
            dist/
            package.json
            CHANGELOG.md
          retention-days: 90

  docker:
    name: 🐳 Docker Multi-arch
    runs-on: ubuntu-latest
    needs: [validate, release]
    if: needs.validate.outputs.should-release == 'true' && needs.release.result == 'success'
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code AFTER semantic-release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set version variables
        id: vars
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Using CURRENT version from package.json: $VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT
          echo "image-latest=${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.vars.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=ByteBerry oauth2 API
            org.opencontainers.image.vendor=JRuvalcabaFSD
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: 🏗️ Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            COMMIT_SHA=${{ github.sha }}

      - name: 🧪 Test multi-arch images
        run: |
          echo "🧪 Testing published images..."

          echo "Testing AMD64 image..."
          docker run --rm --platform linux/amd64 \
            ${{ steps.vars.outputs.image-tag }} \
            node -e "console.log('AMD64 image working - version ${{ steps.vars.outputs.version }}')"

          echo "Testing ARM64 image availability..."
          docker manifest inspect ${{ steps.vars.outputs.image-tag }} | grep "arm64" && echo "✅ ARM64 image available"

      - name: 📊 Image summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Platforms | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ steps.vars.outputs.version }}\` | linux/amd64, linux/arm64 | Multi-arch |" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | linux/amd64, linux/arm64 | Multi-arch |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Pull Commands:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Latest version" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.vars.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Always latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.vars.outputs.image-latest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Raspberry Pi 5 (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "docker pull --platform linux/arm64 ${{ steps.vars.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  sync-develop:
    name: 🔄 Sync develop branch
    runs-on: ubuntu-latest
    needs: [validate, release, docker]
    if: |
      always() &&
      needs.validate.outputs.should-release == 'true' &&
      needs.release.result == 'success' &&
      (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    timeout-minutes: 10

    steps:
      - name: 📊 Debug information
        run: |
          echo "🔍 Debugging sync-develop execution..."
          echo "should-release: ${{ needs.validate.outputs.should-release }}"
          echo "release.result: ${{ needs.release.result }}"
          echo "release.outputs.released: ${{ needs.release.outputs.released }}"
          echo "docker.result: ${{ needs.docker.result }}"
          echo "Current ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"

      - name: 📥 Checkout main branch (post-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Config git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 📡 Fetch all branches
        run: git fetch origin --prune

      - name: 🔍 Check sync status
        id: check
        run: |
          echo "🔍 Checking branch synchronization after release..."

          MAIN_COMMIT=$(git rev-parse origin/main)
          DEVELOP_COMMIT=$(git rev-parse origin/develop)

          echo "Main commit (post-release):    $MAIN_COMMIT"
          echo "Develop commit (pre-release):   $DEVELOP_COMMIT"

          if [ "$MAIN_COMMIT" != "$DEVELOP_COMMIT" ]; then
            if git merge-base --is-ancestor origin/develop origin/main; then
              echo "sync-needed=true" >> $GITHUB_OUTPUT

              COMMITS_AHEAD=$(git rev-list --count origin/develop..origin/main)
              echo "commits-ahead=$COMMITS_AHEAD" >> $GITHUB_OUTPUT
              echo "📊 Main is $COMMITS_AHEAD commits ahead after release"
            else
              echo "sync-needed=false" >> $GITHUB_OUTPUT
              echo "⚠️ Branches have diverged - cannot auto-sync"
            fi
          else
            echo "sync-needed=false" >> $GITHUB_OUTPUT
            echo "✅ Branches already in sync"
          fi

          echo "📋 Last 3 commits in main:"
          git log --oneline -3 origin/main
          echo "📋 Last 3 commits in develop:"
          git log --oneline -3 origin/develop

      - name: 🔄 Sync develop with release changes
        if: steps.check.outputs.sync-needed == 'true'
        run: |
          echo "🔄 Syncing develop with release changes..."

          RELEASE_VERSION="${{ needs.release.outputs.version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "📦 Syncing version: $RELEASE_VERSION"

          git checkout develop
          git pull origin develop || echo "Develop fetched"

          echo "📋 Release changes to merge:"
          git log --oneline --max-count=5 origin/develop..origin/main

          if git merge-base --is-ancestor origin/develop origin/main; then
            echo "✅ Fast-forward merge possible"
            git merge --ff-only origin/main
          else
            echo "⚠️ Creating merge commit for release changes"
            git merge --no-ff origin/main -m "chore: sync develop with release v${RELEASE_VERSION}

          Auto-sync after successful Release-CI completion.
          Merging semantic-release changes including version bump and CHANGELOG.

          Release info:
          - Version: ${RELEASE_VERSION}
          - Docker: jruvalcabafsd/byteberry-oauth2:${RELEASE_VERSION}
          - Trigger: ${{ github.event_name }}"
          fi

          git push origin develop
          echo "✅ Develop synced with release v${RELEASE_VERSION}"

          NEW_DEVELOP_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)

          if [ "$NEW_DEVELOP_COMMIT" = "$MAIN_COMMIT" ]; then
            echo "✅ Sync verified - develop now at v${RELEASE_VERSION}"
          else
            echo "⚠️ Sync verification: commits differ but merge completed"
            echo "Main:    $MAIN_COMMIT"
            echo "Develop: $NEW_DEVELOP_COMMIT"
          fi

      - name: 📊 Sync summary
        run: |
          if [ "${{ steps.check.outputs.sync-needed }}" == "true" ]; then
            RELEASE_VERSION="${{ needs.release.outputs.version }}"
            if [ -z "$RELEASE_VERSION" ]; then
              RELEASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
            fi

            echo "## 🔄 Post-Release Sync Completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 📦 Release Version | \`${RELEASE_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔄 Commits Synced | ${{ steps.check.outputs.commits-ahead }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 🎯 Target Branch | develop |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Status | Synchronized |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Sync Details:" >> $GITHUB_STEP_SUMMARY
            echo "- Merged release changes from main to develop" >> $GITHUB_STEP_SUMMARY
            echo "- Updated package.json version" >> $GITHUB_STEP_SUMMARY
            echo "- Synchronized CHANGELOG.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Sync Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Branches are already synchronized or sync not possible." >> $GITHUB_STEP_SUMMARY
          fi

  post-release:
    name: 📋 Post-Release
    runs-on: ubuntu-latest
    needs: [validate, release, docker, sync-develop]
    if: needs.release.outputs.released == 'true' && needs.docker.result == 'success'
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Release summary
        run: |
          echo "# 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Version | \`v${{ needs.release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Git Tag | [\`v${{ needs.release.outputs.version }}\`](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.version }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker | [\`${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}\`](https://hub.docker.com/r/jruvalcabafsd/byteberry-oauth2) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Platforms | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Branch Sync | ✅ develop synchronized |" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Changelog | [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker images are available for pull" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub release created with changelog" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Raspberry Pi 5 (ARM64) support ready" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Develop branch synchronized with release" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Success notification
        run: |
          echo "🎉 Release v${{ needs.release.outputs.version }} completed successfully!"
          echo "📦 Docker: ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}"
          echo "🏷️ GitHub: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.version }}"
          echo "🔄 Branches: main and develop synchronized at v${{ needs.release.outputs.version }}"

  on-failure:
    name: ❌ Release Failed
    runs-on: ubuntu-latest
    needs: [validate, release, docker, sync-develop]
    if: always() && (needs.validate.result == 'failure' || needs.release.result == 'failure' || needs.docker.result == 'failure' || needs.sync-develop.result == 'failure')

    steps:
      - name: 📊 Failure summary
        run: |
          echo "# ❌ Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Develop | ${{ needs.sync-develop.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 Check the failed job logs for details." >> $GITHUB_STEP_SUMMARY

      - name: ❌ Notify failure
        run: |
          echo "❌ Release pipeline failed"
          echo "Validation: ${{ needs.validate.result }}"
          echo "Release: ${{ needs.release.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Sync Develop: ${{ needs.sync-develop.result }}"
          exit 1
