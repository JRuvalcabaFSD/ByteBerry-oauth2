name: 🚀 Release CI - OAUTH2

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/byteberry-oauth2

jobs:
  setup-and-validate:
    name: ✅ Setup & Validate
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      next-version: ${{ steps.plan.outputs.next-version }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 💾 Cache node_modules
        uses: actions/cache/save@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🔍 Run full validation        
        run: |
          export NODE_ENV=test
          export CI=true
          export CORS_ORIGINS="${{ secrets.CORS_ORIGINS_CI }}"
          pnpm type-check
          pnpm lint
          pnpm audit
          pnpm build
          pnpm test:coverage

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-release
          path: dist/
          retention-days: 1

      - name: 🔍 Check if should release
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "Manual release triggered"
          else
            COMMITS=$(git log --format="%s" HEAD~1..HEAD)
            if echo "$COMMITS" | grep -E "^(feat|fix|BREAKING CHANGE)"; then
              echo "should-release=true" >> $GITHUB_OUTPUT
              echo "Found releasable commits"
            else
              echo "should-release=false" >> $GITHUB_OUTPUT
              echo "No releasable commits found"
            fi
          fi

      - name: 🧮 Plan next version (semantic-release dry-run)
        id: plan
        if: steps.check.outputs.should-release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm dlx semantic-release --dry-run --no-ci > sr-dry-run.log 2>&1 || true
          NEXT=$(grep -Eo "next release version is [0-9]+\.[0-9]+\.[0-9]+" sr-dry-run.log | awk '{{print $NF}}' | tail -n1)
          echo "next-version=$NEXT" >> $GITHUB_OUTPUT
          echo "Planned next version: $NEXT"

      - name: ✅ Set should-release from plan
        if: steps.plan.outputs.next-version != ''
        run: echo "should-release=true" >> $GITHUB_OUTPUT
        shell: bash

  docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: [ setup-and-validate ]
    if: needs.setup-and-validate.outputs.next-version != ''
    outputs:
      image-pushed: ${{ steps.pushcheck.outputs.ok }}
      version: ${{ steps.vars.outputs.version }}
      image-tag: ${{ steps.vars.outputs.image-tag }}
      image-latest: ${{ steps.vars.outputs.image-latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version & tags
        id: vars
        run: |
          VERSION="${{ needs.setup-and-validate.outputs.next-version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT
          echo "image-latest=${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image-tag }}
            ${{ steps.vars.outputs.image-latest }}

      - name: ✅ Verify push (manifest)
        id: pushcheck
        run: |
          docker buildx imagetools inspect "${{ steps.vars.outputs.image-tag }}"
          docker buildx imagetools inspect "${{ steps.vars.outputs.image-latest }}"
          echo "ok=true" >> $GITHUB_OUTPUT

  release:
    name: 🏷️ Publish Release
    runs-on: ubuntu-latest
    needs: [ setup-and-validate, docker ]
    if: needs.setup-and-validate.outputs.should-release == 'true' &&
        needs.docker.result == 'success' &&
        needs.docker.outputs.image-pushed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm dlx semantic-release --no-ci

      - name: 🔎 Assert planned vs actual version
        if: needs.setup-and-validate.outputs.next-version != ''
        run: |
          echo "Expected: ${{ needs.setup-and-validate.outputs.next-version }}"
          echo "Actual:   ${{ steps.sr.outputs.version }}"
          test "${{ steps.sr.outputs.version }}" = "${{ needs.setup-and-validate.outputs.next-version }}"

  post-release:
    name: 📣 Post Release
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.result == 'success'
    steps:
      - run: echo "Add post-release tasks here"
