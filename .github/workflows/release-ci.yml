name: 🚀 Release CI - OAUTH2

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/byteberry-oauth2

jobs:
  setup-and-validate:
    name: ✅ Setup & Validate
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      next-version: ${{ steps.plan.outputs.next-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test (coverage)
        run: pnpm test:coverage

      - name: 🔍 Check if should release
        id: check
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "should-release=true" >> $GITHUB_OUTPUT
          else
            echo "should-release=false" >> $GITHUB_OUTPUT
          fi

      - name: 🧮 Plan next version (semantic-release dry-run)
        id: plan
        if: steps.check.outputs.should-release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm dlx semantic-release --dry-run --no-ci > sr-dry-run.log 2>&1 || true
          NEXT=$(grep -Eo "next release version is [0-9]+\.[0-9]+\.[0-9]+" sr-dry-run.log | awk '{{print $NF}}' | tail -n1)
          echo "next-version=$NEXT" >> $GITHUB_OUTPUT
          echo "Planned next version: $NEXT"

  docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: [ setup-and-validate ]
    if: needs.setup-and-validate.outputs.next-version != ''
    outputs:
      image-pushed: ${{ steps.pushcheck.outputs.ok }}
      version: ${{ steps.vars.outputs.version }}
      image-tag: ${{ steps.vars.outputs.image-tag }}
      image-latest: ${{ steps.vars.outputs.image-latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version & tags
        id: vars
        run: |
          VERSION="${{ needs.setup-and-validate.outputs.next-version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT
          echo "image-latest=${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image-tag }}
            ${{ steps.vars.outputs.image-latest }}

      - name: ✅ Verify push
        id: pushcheck
        run: |
          echo "ok=true" >> $GITHUB_OUTPUT

  release:
    name: 🏷️ Publish Release
    runs-on: ubuntu-latest
    needs: [ setup-and-validate, docker ]
    if: needs.setup-and-validate.outputs.should-release == 'true' &&
        needs.docker.result == 'success' &&
        needs.docker.outputs.image-pushed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm dlx semantic-release --no-ci

      - name: 🔎 Assert planned vs actual version
        if: needs.setup-and-validate.outputs.next-version != ''
        run: |
          echo "Expected: ${{ needs.setup-and-validate.outputs.next-version }}"
          echo "Actual:   ${{ steps.sr.outputs.version }}"
          test "${{ steps.sr.outputs.version }}" = "${{ needs.setup-and-validate.outputs.next-version }}"

  post-release:
    name: 📣 Post Release
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.result == 'success'
    steps:
      - run: echo "Add post-release tasks here"
